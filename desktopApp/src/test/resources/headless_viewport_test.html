<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Headless Viewport Test</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            width: 100vw;
            height: 100vh;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            overflow: hidden;
            position: relative;
        }
        .size-info {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: white;
            background: rgba(0,0,0,0.4);
            padding: 40px 60px;
            border-radius: 12px;
        }
        .size-info h1 { font-size: 48px; margin-bottom: 20px; }
        .size-info p { font-size: 24px; margin: 8px 0; }
        .corner {
            position: absolute;
            width: 80px;
            height: 80px;
            border: 6px solid white;
        }
        .corner.tl { top: 20px; left: 20px; border-right: none; border-bottom: none; }
        .corner.tr { top: 20px; right: 20px; border-left: none; border-bottom: none; }
        .corner.bl { bottom: 20px; left: 20px; border-right: none; border-top: none; }
        .corner.br { bottom: 20px; right: 20px; border-left: none; border-top: none; }
        .ruler-h {
            position: absolute;
            bottom: 120px;
            left: 0;
            right: 0;
            height: 40px;
            background: repeating-linear-gradient(
                90deg,
                rgba(255,255,255,0.8) 0px,
                rgba(255,255,255,0.8) 2px,
                transparent 2px,
                transparent 100px
            );
            border-top: 2px solid white;
        }
        .ruler-h::after {
            content: '0        100px markers';
            position: absolute;
            left: 10px;
            top: -30px;
            color: white;
            font-size: 16px;
            white-space: pre;
        }
    </style>
</head>
<body>
    <div class="corner tl"></div>
    <div class="corner tr"></div>
    <div class="corner bl"></div>
    <div class="corner br"></div>
    <div class="ruler-h"></div>
    <div class="size-info">
        <h1>Headless Viewport Test</h1>
        <p id="viewport-size">innerWidth: - innerHeight: -</p>
        <p id="pixel-ratio">devicePixelRatio: -</p>
        <p id="user-agent"></p>
    </div>
    <script>
        function update() {
            document.getElementById('viewport-size').textContent = 
                'innerWidth: ' + window.innerWidth + '  innerHeight: ' + window.innerHeight;
            document.getElementById('pixel-ratio').textContent = 
                'devicePixelRatio: ' + window.devicePixelRatio;
            document.getElementById('user-agent').textContent = navigator.userAgent;
        }
        update();
        window.addEventListener('resize', update);
    </script>
</body>
</html>
