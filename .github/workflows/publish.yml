name: Publish to Maven Central

on:
  release:
    types: [published]
  workflow_dispatch: # Allow manual triggering

jobs:
  publish:
    runs-on: macos-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up JetBrains Runtime with JCEF (JDK 21)
        uses: actions/setup-java@v4
        with:
          distribution: 'jetbrains'
          java-version: '21'
          java-package: 'jdk+jcef'
        env:
          GITHUB_TOKEN: ${{ secrets.COMMON }}

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: wrapper

      - name: Publish to Maven Central
        run: |
          if [[ $GITHUB_REF == refs/tags/* ]]; then
            VERSION_NAME=${GITHUB_REF#refs/tags/}
            VERSION_NAME=${VERSION_NAME#v}
            echo "Releasing version from tag: $VERSION_NAME"
            ./gradlew publishToMavenCentral -PRELEASE_VERSION=$VERSION_NAME --no-configuration-cache
          else
            echo "Releasing default version..."
            ./gradlew publishToMavenCentral --no-configuration-cache
          fi
        env:
          ORG_GRADLE_PROJECT_mavenCentralUsername: ${{ secrets.MAVEN_CENTRAL_USERNAME }}
          ORG_GRADLE_PROJECT_mavenCentralPassword: ${{ secrets.MAVEN_CENTRAL_PASSWORD }}
          ORG_GRADLE_PROJECT_signingInMemoryKey: ${{ secrets.GPG_KEY_CONTENTS }}
          ORG_GRADLE_PROJECT_signingInMemoryKeyPassword: ${{ secrets.SIGNING_PASSWORD }}
